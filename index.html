<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Stress Test</title>

  <style>
    body {
      font-family: Helvetica, Arial, sans-serif;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    h2 {
      font-family: 'Roboto Slab', Helvetica, Arial, sans-serif;
      font-size: clamp(2rem, 5rem, 5rem);
    }
    .app {
      container-type: inline-size;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .drop-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 200px;
      padding: 50px;
      border: 2px dashed #aaa;
      border-radius: 10px;
      color: #666;
      cursor: pointer;
      font-size: clamp(1rem, 4rem, 5rem);
    }

    .drop-zone.dragover {
      border-color: #333;
      background: #f0f0f0;
      color: #000;
    }

    input[type="file"] {
      display: none;
    }

    #message {
      color: red;
      font-weight: bold;
    }

    /* Grid of images */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      row-gap: clamp(1rem, 2rem, 3rem);
    }

    .img-box {
      flex: 1 1 calc(33.333% - 10px);
      display: flex;
      flex-direction: column;
      gap: 3px;
      overflow: hidden;
      min-height: 200px;
      /* row-gap: 30px; */
    }

    .img-box span {
      font-size: 14px;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.5;
    }

    .img-box img {
      width: 100%;
      height: auto;
      object-fit: fill;
      border: none;
    }

    .img-wrapper {
      overflow: hidden;
      position: relative;
      height: 100%;
    }

    /* Filters */
    .bw {filter: grayscale(100%) contrast(10);}
    .blur {filter: blur(8px);}
    .invert { filter: invert(100%); }
    .contrast {filter: contrast(5%);background-color: #555;}
    .brightness {filter: brightness(30%);}
    .sepia { filter: sepia(100%); }
    .hue {filter: brightness(0.1) contrast(.30);}
    .single-color {filter: saturate(0%) brightness(55%) contrast(1000%);}    
    .small-scale {
      transform: scale(0.25);
      transform-origin: center;
    }    
    .pixelate {
      image-rendering: pixelated;
      transform: scale(2.5);
      transform-origin: bottom;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .overlay-container {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
    }

    .overlay-container img:first-child {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }

    .overlay-container img.overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>Logo Stress Test</h2>

  <div class="drop-zone" id="dropZone">
    Drop image here or click to upload
  </div>

  <input type="file" id="fileInput" accept="image/*,.svg">

  <div id="message"></div>

  <div class="grid" id="grid" style="display:none;">
    <div class="img-box"><span>Original</span><img></div>
    <div class="img-box"><span>Black & White</span><img class="bw"></div>
    <div class="img-box"><span>Inverted</span><img class="invert"></div>
    <div class="img-box"><span>Large scale / Partial</span><div class="img-wrapper"><img class="pixelate"></div></div>
    <div class="img-box"><span>Small scale</span><div class="img-wrapper"><img class="small-scale"></div></div>
    <div class="img-box"><span>Single Color</span><img class="single-color"></div>
    <div class="img-box"><span>Blurred</span><img class="blur"></div>
    <div class="img-box"><span>Degraded Surface</span><div class="overlay-container"><img><img class="overlay" src="images/scratched-surface.png"></div></div>
    <div class="img-box"><span>Low Contrast</span><img class="contrast"></div>
<!--    
    <div class="img-box"><span>Dark</span><img class="brightness"></div>
    <div class="img-box"><span>Sepia</span><img class="sepia"></div>
    <div class="img-box"><span>Hue Shift</span><img class="hue"></div>
  -->
  </div>

  <div class="buttons">
    <button id="resetBtn">Reset</button>
  </div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const grid = document.getElementById('grid');
  const message = document.getElementById('message');
  const resetBtn = document.getElementById('resetBtn');

  const images = document.querySelectorAll('.img-box img:not(.overlay)');

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    if (!file) return;

    message.textContent = '';

    const name = file.name.toLowerCase();

    if (name.endsWith('.ai') || name.endsWith('.eps')) {
      showError('Please convert AI/EPS files to SVG or PNG.');
      return;
    }

    if (!file.type.startsWith('image/') && file.type !== 'application/pdf') {
      showError('Invalid image file.');
      return;
    }

    const reader = new FileReader();

    reader.onload = () => {
      images.forEach(img => img.src = reader.result);
      grid.style.display = 'flex';
    };

    reader.readAsDataURL(file);
  }

  function showError(text) {
    grid.style.display = 'none';
    fileInput.value = '';
    message.textContent = text;
  }

  resetBtn.addEventListener('click', () => {
    grid.style.display = 'none';
    fileInput.value = '';
    message.textContent = '';
  });
</script>

</body>
</html>
